name: AI Code Review & Quality Gates (Ollama + Security Check)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      prompt_override:
        description: 'Optional Prompt to override the default prompt.txt for this execution'
        required: false
        type: string
      project_type:
        description: 'Is this a new or existing project?'
        required: true
        type: choice
        options:
          - new
          - existing
        default: 'new'
      target_repo:
        description: 'Target repository name (e.g. your_username/your_new_repo)'
        required: true
        type: string

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Override Prompt (If Provided)
        if: ${{ github.event.inputs.prompt_override != '' }}
        run: echo "${{ github.event.inputs.prompt_override }}" > prompt.txt

      - name: Cache Testing Virtual Environment
        uses: actions/cache@v4
        with:
          path: .test_venv
          key: ${{ runner.os }}-test-venv-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-test-venv-

      - name: Cache npm global packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-global-linters
          restore-keys: |
            ${{ runner.os }}-npm-global-

      - name: Install dependencies
        run: |
          # Node / Web
          npm install -g eslint htmlhint stylelint stylelint-config-standard
          # Go 
          go install golang.org/x/lint/golint@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
          # Python
          pip install -r requirements.txt

      - name: Check Remote GPU Availability
        id: gpu_scan
        env:
          GPU_PLATFORM: ${{ secrets.GPU_PLATFORM || 'auto' }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'ollama' }}
          OLLAMA_URL: ${{ secrets.OLLAMA_URL || '' }}
          COLAB_OLLAMA_URL: ${{ secrets.COLAB_OLLAMA_URL || '' }}
          KAGGLE_OLLAMA_URL: ${{ secrets.KAGGLE_OLLAMA_URL || '' }}
          VASTAI_OLLAMA_URL: ${{ secrets.VASTAI_OLLAMA_URL || '' }}
          RUNPOD_OLLAMA_URL: ${{ secrets.RUNPOD_OLLAMA_URL || '' }}
          LIGHTNING_OLLAMA_URL: ${{ secrets.LIGHTNING_OLLAMA_URL || '' }}
          HF_OLLAMA_URL: ${{ secrets.HF_OLLAMA_URL || '' }}
          ORACLE_OLLAMA_URL: ${{ secrets.ORACLE_OLLAMA_URL || '' }}
          SAGEMAKER_OLLAMA_URL: ${{ secrets.SAGEMAKER_OLLAMA_URL || '' }}
          PAPERSPACE_OLLAMA_URL: ${{ secrets.PAPERSPACE_OLLAMA_URL || '' }}
          SATURN_OLLAMA_URL: ${{ secrets.SATURN_OLLAMA_URL || '' }}
          CODESPACES_OLLAMA_URL: ${{ secrets.CODESPACES_OLLAMA_URL || '' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || '' }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || '' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}
          CUSTOM_OLLAMA_URL: ${{ secrets.CUSTOM_OLLAMA_URL || '' }}
        run: |
          echo "Scanning runner environment..."
          python scripts/select_model.py > output.log
          cat output.log
          MODEL_NAME=$(tail -n 1 output.log)
          echo "SELECTED_MODEL=$MODEL_NAME" >> $GITHUB_ENV
          echo "Intelligence selected: $MODEL_NAME"

          cat << 'EOF' > check_gpu.py
          import sys, os
          
          # Check for Cloud Providers first
          provider = os.getenv("LLM_PROVIDER", "auto").lower()
          cloud_configs = [
              ("groq", "GROQ_API_KEY"),
              ("cerebras", "CEREBRAS_API_KEY"),
              ("openai", "OPENAI_API_KEY"),
              ("anthropic", "ANTHROPIC_API_KEY"),
              ("gemini", "GOOGLE_API_KEY"),
          ]
          has_cloud = False
          if provider == "auto":
              for name, key in cloud_configs:
                  if os.getenv(key):
                      print(f"✅ Found cloud provider ({name}) via auto failover.")
                      has_cloud = True
                      break
          else:
              for name, key in cloud_configs:
                  if provider == name and os.getenv(key):
                      print(f"✅ Found explicit cloud provider: {name}")
                      has_cloud = True
                      break
                      
          if has_cloud:
              sys.exit(0)

          # Fallback to checking remote Ollama GPU
          sys.path.insert(0, os.path.abspath(os.path.join(os.path.dirname(__file__))))
          import scripts.gpu_platform as gpu_platform
          platform, url = gpu_platform.select_platform()
          if platform != "local":
              print(f"✅ Found active remote GPU: {platform}")
              sys.exit(0)
          sys.exit(1)
          EOF

          if python check_gpu.py; then
            echo "Skipping local Ollama installation to save CI time."
            echo "LOCAL_OLLAMA_REQUIRED=false" >> $GITHUB_ENV
          else
            echo "LOCAL_OLLAMA_REQUIRED=true" >> $GITHUB_ENV
          fi

      - name: Cache Ollama Models
        if: env.LOCAL_OLLAMA_REQUIRED == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ${{ runner.os }}-ollama-models
          restore-keys: |
            ${{ runner.os }}-ollama-

      - name: Install Local Ollama
        if: env.LOCAL_OLLAMA_REQUIRED == 'true'
        run: |
          echo "No remote GPU found. Installing local Ollama and pulling ${{ env.SELECTED_MODEL }}..."
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          if ! ollama list 2>/dev/null | grep -q "${{ env.SELECTED_MODEL }}"; then
            echo "Pulling model ${{ env.SELECTED_MODEL }}..."
            ollama pull ${{ env.SELECTED_MODEL }}
          else
            echo "Model ${{ env.SELECTED_MODEL }} already cached. Skipping download."
          fi

      - name: Auto-Test the CI Pipeline (Ephemeral Venv)
        run: bash run-tests.sh

      - name: Run AI Review Pipeline 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          OLLAMA_MODEL: ${{ env.SELECTED_MODEL }}
          OLLAMA_URL: ${{ secrets.OLLAMA_URL || '' }}
          PROJECT_TYPE: ${{ github.event.inputs.project_type }}
          TARGET_REPO: ${{ github.event.inputs.target_repo }}
          GPU_PLATFORM: ${{ secrets.GPU_PLATFORM || 'auto' }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'ollama' }}
          COLAB_OLLAMA_URL: ${{ secrets.COLAB_OLLAMA_URL || '' }}
          KAGGLE_OLLAMA_URL: ${{ secrets.KAGGLE_OLLAMA_URL || '' }}
          VASTAI_OLLAMA_URL: ${{ secrets.VASTAI_OLLAMA_URL || '' }}
          RUNPOD_OLLAMA_URL: ${{ secrets.RUNPOD_OLLAMA_URL || '' }}
          LIGHTNING_OLLAMA_URL: ${{ secrets.LIGHTNING_OLLAMA_URL || '' }}
          HF_OLLAMA_URL: ${{ secrets.HF_OLLAMA_URL || '' }}
          ORACLE_OLLAMA_URL: ${{ secrets.ORACLE_OLLAMA_URL || '' }}
          SAGEMAKER_OLLAMA_URL: ${{ secrets.SAGEMAKER_OLLAMA_URL || '' }}
          PAPERSPACE_OLLAMA_URL: ${{ secrets.PAPERSPACE_OLLAMA_URL || '' }}
          SATURN_OLLAMA_URL: ${{ secrets.SATURN_OLLAMA_URL || '' }}
          CODESPACES_OLLAMA_URL: ${{ secrets.CODESPACES_OLLAMA_URL || '' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || '' }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || '' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}
          CUSTOM_OLLAMA_URL: ${{ secrets.CUSTOM_OLLAMA_URL || '' }}
        run: python scripts/ai_pipeline.py --manual

      - name: Upload AI Generated Artifacts 
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-generated-scaffold
          path: your_project/
          retention-days: 3

      - name: Post PR Summary Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ai-review
          message: |
            🤖 **AI Code Orchestration Completed**
            - Generation, Review, and TDD loop completed!
            - Triggering Matrix Quality Gates (Lint, Complexity, Test)...

  quality-gates:
    needs: ai-review
    runs-on: ubuntu-latest
    strategy:
      matrix:
        check: [test, lint, complexity]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          
      - name: Install Analysis Dependencies
        run: pip install pytest coverage pylint radon
        
      - name: Download AI Generated Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ai-generated-scaffold
          path: your_project/

      - name: Run User Project Tests (If Python)
        if: matrix.check == 'test'
        run: |
          if [ -d "your_project" ] && [ -n "$(find your_project -name '*.py')" ]; then
            echo "Python code generated. Attempting to run project-specific tests..."
            coverage run -m pytest your_project/ || true
            coverage report -m || true
          else
            echo "No Python files found in your_project/, skipping Python coverage."
          fi

      - name: Lint checks
        if: matrix.check == 'lint'
        run: |
          if [ -d "your_project" ]; then
            pylint your_project/ > pylint_report.txt || true
            score=$(grep "Your code has been rated" pylint_report.txt | awk '{print $7}' | cut -d'/' -f1 || echo "0")
            if (( $(echo "$score < 8" | bc -l) )); then
              echo "❌ Lint score below 8/10 ($score)"
              exit 1
            fi
            echo "✅ Lint score is $score/10"
          fi

      - name: Complexity checks
        if: matrix.check == 'complexity'
        run: |
          if [ -d "your_project" ]; then
            radon cc your_project/ -s > complexity_report.txt
            if grep -q "F" complexity_report.txt; then
              echo "❌ Complexity too high"
              exit 1
            fi
            echo "✅ Complexity acceptable"
          fi
