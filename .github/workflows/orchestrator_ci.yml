name: AI Orchestrator CI

on:
  workflow_dispatch:
    inputs:
      orchestrator:
        description: 'Which AI Orchestrator to run?'
        required: true
        default: '--crewai'
        type: choice
        options:
          - --crewai
          - --openhands
          - --pydanticai
          - --aider
          - --langgraph
      prompt:
        description: 'The prompt or task for the AI'
        required: true
        default: 'Run a standard software engineering scan and fix.'
      llm_provider:
        description: 'LLM Provider'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - ollama
          - openai
          - anthropic
          - gemini
          - groq
      ollama_model:
        description: 'Ollama Model (if using Ollama)'
        default: 'qwen2.5-coder:3b'

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests PyGithub

      - name: Run Orchestrator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_PROVIDER: ${{ github.event.inputs.llm_provider }}
          OLLAMA_MODEL: ${{ github.event.inputs.ollama_model }}
          OLLAMA_URL: ${{ secrets.OLLAMA_URL }}
        run: |
          python scripts/ai_pipeline.py ${{ github.event.inputs.orchestrator }} "${{ github.event.inputs.prompt }}"
